    color: #1d4ed8 !important;
    background-color: transparent !important;
    font-weight: 600;
  }
  .nav-treeview .nav-link.active i.nav-icon::before {
    content: "\f192";

  .nav-treeview .nav-link.active i.nav-icon {
    color: #2563eb !important;
    font-weight: 900;

  .nav-treeview .nav-link:hover {
