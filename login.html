<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login Pemilik Toko | SewaTendaku</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />

    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              primary: "#4F46E5" /* Indigo khas Neokademi */,
              primaryHover: "#4338CA",
            },
            fontFamily: {
              sans: [
                "Inter",
                "ui-sans-serif",
                "system-ui",
                "-apple-system",
                "BlinkMacSystemFont",
                "Segoe UI",
                "Roboto",
                "Helvetica Neue",
                "Arial",
                "sans-serif",
              ],
            },
          },
        },
      };
    </script>
    <style>
      /* Import Font Inter & Outfit */
      @import url("https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Outfit:wght@800&display=swap");

      /* Cegah Horizontal Scroll secara paksa */
      html,
      body {
        font-family: "Inter", sans-serif;
        overflow-x: hidden;
        width: 100%;
      }

      /* Font khusus logo */
      .brand-font {
        font-family: "Outfit", sans-serif;
        letter-spacing: -0.5px;
      }

      /* --- ANIMASI LOGIN CARD --- */
      @keyframes fadeSlideUp {
        0% {
          opacity: 0;
          transform: translateY(30px);
        }
        100% {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .animate-card {
        animation: fadeSlideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        opacity: 0; /* Mulai dari transparan agar animasinya mulus */
      }
    </style>
  </head>
  <body
    class="bg-[#FAFAFA] text-gray-800 antialiased min-h-screen flex flex-col relative"
  >
    <div class="fixed inset-0 z-[-1] overflow-hidden pointer-events-none">
      <div
        class="absolute top-0 right-0 -mr-20 -mt-20 w-96 h-96 rounded-full bg-primary/5 blur-3xl"
      ></div>
      <div
        class="absolute bottom-0 left-0 -ml-20 -mb-20 w-80 h-80 rounded-full bg-blue-400/10 blur-3xl"
      ></div>
    </div>

    <nav
      class="absolute top-0 w-full z-50 bg-white/90 backdrop-blur-lg border-b border-gray-100"
    >
      <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex justify-between h-16 items-center">
          <a href="index.html" class="flex items-center cursor-pointer">
            <span class="brand-font text-xl md:text-2xl text-gray-900"
              >SewaTendaku</span
            >
          </a>

          <div class="flex items-center space-x-2 sm:space-x-3">
            <a
              href="index.html"
              class="px-4 py-1.5 sm:py-2 text-sm sm:text-base rounded-lg text-gray-700 font-semibold border border-gray-300 hover:bg-gray-50 transition-colors"
            >
              Beranda
            </a>
            <a
              href="pricing.html"
              class="px-4 py-1.5 sm:py-2 text-sm sm:text-base rounded-lg text-white font-semibold bg-primary hover:bg-primaryHover transition-colors shadow-sm"
            >
              Buka Toko
            </a>
          </div>
        </div>
      </div>
    </nav>

    <div
      class="flex-grow flex items-center justify-center px-4 sm:px-6 lg:px-8 pt-24 pb-12"
    >
      <div
        class="max-w-md w-full bg-white rounded-3xl shadow-xl border border-gray-100 p-8 sm:p-10 relative animate-card"
      >
        <div class="flex justify-center mb-6">
          <div
            class="w-14 h-14 bg-indigo-50 border border-indigo-100 text-primary rounded-2xl flex items-center justify-center text-2xl"
          >
            <i class="fa-solid fa-store"></i>
          </div>
        </div>

        <div class="text-center mb-8">
          <h3 class="text-2xl font-bold text-gray-900 mb-2">
            Selamat Datang Kembali
          </h3>
          <p class="text-gray-500 text-sm px-2">
            Masuk ke dashboard toko untuk mengelola pesanan dan inventaris Anda.
          </p>
        </div>

        <div
          id="errorMessage"
          class="hidden bg-red-50 border border-red-200 text-red-600 px-4 py-3 rounded-xl mb-6 flex items-start text-sm"
        >
          <i class="fa-solid fa-circle-exclamation mt-0.5 mr-3"></i>
          <span id="errorText"></span>
        </div>

        <form id="loginForm" class="space-y-5">
          <div>
            <label class="block text-sm font-semibold text-gray-700 mb-1.5"
              >Alamat Email</label
            >
            <div class="relative">
              <div
                class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none"
              >
                <i class="fa-regular fa-envelope text-gray-400"></i>
              </div>
              <input
                type="email"
                id="email"
                required
                autofocus
                class="block w-full pl-10 pr-4 py-3 bg-gray-50 border border-gray-200 rounded-xl text-gray-900 text-sm focus:ring-2 focus:ring-primary/20 focus:border-primary focus:bg-white outline-none transition-all placeholder-gray-400"
                placeholder="email@domain.com"
              />
            </div>
          </div>

          <div>
            <div class="flex items-center justify-between mb-1.5">
              <label class="block text-sm font-semibold text-gray-700"
                >Password</label
              >
              <a
                href="#"
                class="text-xs font-semibold text-primary hover:text-primaryHover transition-colors"
                >Lupa Password?</a
              >
            </div>
            <div class="relative">
              <div
                class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none"
              >
                <i class="fa-solid fa-lock text-gray-400 text-sm"></i>
              </div>
              <input
                type="password"
                id="pass"
                required
                class="block w-full pl-10 pr-10 py-3 bg-gray-50 border border-gray-200 rounded-xl text-gray-900 text-sm focus:ring-2 focus:ring-primary/20 focus:border-primary focus:bg-white outline-none transition-all placeholder-gray-400"
                placeholder="••••••••"
              />
              <button
                type="button"
                onclick="togglePass()"
                class="absolute inset-y-0 right-0 pr-4 flex items-center text-gray-400 hover:text-gray-600 focus:outline-none"
              >
                <i class="fa-regular fa-eye" id="eyeIcon"></i>
              </button>
            </div>
          </div>

          <div class="pt-2">
            <button
              type="submit"
              id="submitBtn"
              class="w-full flex justify-center py-3 px-4 border border-transparent rounded-xl shadow-lg shadow-primary/30 text-sm font-bold text-white bg-primary hover:bg-primaryHover focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary transition-all hover:-translate-y-0.5"
            >
              Masuk Dashboard
            </button>
          </div>
        </form>

        <div class="mt-8 text-center">
          <p class="text-sm text-gray-600">
            Belum punya akun toko?
            <a
              href="pricing.html#harga"
              class="font-bold text-primary hover:text-primaryHover transition-colors"
              >Daftar sekarang</a
            >
          </p>
        </div>
      </div>
    </div>

    <script>
      // === 1. FITUR TOGGLE PASSWORD ===
      function togglePass() {
        var x = document.getElementById("pass");
        var icon = document.getElementById("eyeIcon");
        if (x.type === "password") {
          x.type = "text";
          icon.classList.remove("fa-eye");
          icon.classList.add("fa-eye-slash");
        } else {
          x.type = "password";
          icon.classList.remove("fa-eye-slash");
          icon.classList.add("fa-eye");
        }
      }

      // === 2. CEK SESSION (LOCAL STORAGE) SAAT HALAMAN DIMUAT ===
      document.addEventListener("DOMContentLoaded", () => {
        // Jika user sudah login (memiliki ID SaaS), langsung redirect ke Dashboard
        if (
          localStorage.getItem("saas_admin_id") &&
          localStorage.getItem("saas_tenant_id")
        ) {
          window.location.href = "dashboard_saas/index.html";
        }
      });

      // === 3. LOGIKA FETCH LOGIN KE GOOGLE APPS SCRIPT ===
      const GAS_API_URL = "URL_GAS_WEB_APP_ANDA_DISINI";

      document
        .getElementById("loginForm")
        .addEventListener("submit", async function (e) {
          e.preventDefault(); // Cegah reload halaman

          const email = document.getElementById("email").value;
          const password = document.getElementById("pass").value;
          const submitBtn = document.getElementById("submitBtn");
          const errorBox = document.getElementById("errorMessage");
          const errorText = document.getElementById("errorText");

          // Reset tampilan error
          errorBox.classList.add("hidden");
          errorText.textContent = "";

          // Loading state tombol
          const originalBtnText = submitBtn.innerHTML;
          submitBtn.innerHTML =
            '<i class="fa-solid fa-spinner fa-spin mr-2"></i> Memeriksa...';
          submitBtn.disabled = true;

          try {
            // Safety check jika URL belum diisi
            if (GAS_API_URL === "URL_GAS_WEB_APP_ANDA_DISINI") {
              throw new Error(
                "Sistem belum terhubung ke database. Harap setel URL Google Apps Script.",
              );
            }

            // Kirim request ke Backend GAS
            const payload = {
              action: "login",
              email: email,
              password: password,
            };

            const response = await fetch(GAS_API_URL, {
              method: "POST",
              body: JSON.stringify(payload),
            });

            const result = await response.json();

            if (result.status === "success") {
              // Simpan data "session" ke Local Storage browser
              localStorage.setItem("saas_admin_id", result.data.admin_id);
              localStorage.setItem("saas_tenant_id", result.data.tenant_id);
              localStorage.setItem("saas_nama", result.data.nama);
              localStorage.setItem("saas_nama_toko", result.data.nama_toko);
              localStorage.setItem("saas_domain_slug", result.data.domain_slug);
              localStorage.setItem(
                "saas_status_berlangganan",
                result.data.status_berlangganan,
              );

              // Arahkan ke dashboard SaaS
              window.location.href = "dashboard_saas/index.html";
            } else {
              throw new Error(result.message || "Email atau password salah.");
            }
          } catch (error) {
            // Tampilkan pesan error
            errorText.textContent = error.message;
            errorBox.classList.remove("hidden");
          } finally {
            // Kembalikan tombol ke semula jika gagal
            submitBtn.innerHTML = originalBtnText;
            submitBtn.disabled = false;
          }
        });
    </script>
  </body>
</html>
