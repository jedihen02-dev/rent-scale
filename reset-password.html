<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reset Password Admin | SewaTendaku</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />

    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              primary: "#4F46E5" /* Indigo khas Neokademi */,
              primaryHover: "#4338CA",
            },
            fontFamily: {
              sans: [
                "Inter",
                "ui-sans-serif",
                "system-ui",
                "-apple-system",
                "BlinkMacSystemFont",
                "Segoe UI",
                "Roboto",
                "Helvetica Neue",
                "Arial",
                "sans-serif",
              ],
            },
          },
        },
      };
    </script>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Outfit:wght@800&display=swap");
      html,
      body {
        font-family: "Inter", sans-serif;
        overflow-x: hidden;
        width: 100%;
      }
      .brand-font {
        font-family: "Outfit", sans-serif;
        letter-spacing: -0.5px;
      }

      @keyframes fadeSlideUp {
        0% {
          opacity: 0;
          transform: translateY(30px);
        }
        100% {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .animate-card {
        animation: fadeSlideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        opacity: 0;
      }
    </style>
  </head>
  <body
    class="bg-[#FAFAFA] text-gray-800 antialiased min-h-screen flex flex-col relative"
  >
    <div class="fixed inset-0 z-[-1] overflow-hidden pointer-events-none">
      <div
        class="absolute top-0 right-0 -mr-20 -mt-20 w-96 h-96 rounded-full bg-primary/5 blur-3xl"
      ></div>
      <div
        class="absolute bottom-0 left-0 -ml-20 -mb-20 w-80 h-80 rounded-full bg-blue-400/10 blur-3xl"
      ></div>
    </div>

    <nav
      class="absolute top-0 w-full z-50 bg-white/90 backdrop-blur-lg border-b border-gray-100"
    >
      <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex justify-between h-16 items-center">
          <a href="index.html" class="flex items-center cursor-pointer">
            <span class="brand-font text-xl md:text-2xl text-gray-900"
              >SewaTendaku</span
            >
          </a>
          <div class="flex items-center space-x-2 sm:space-x-3">
            <a
              href="login.html"
              class="px-4 py-1.5 sm:py-2 text-sm sm:text-base rounded-lg text-gray-700 font-semibold border border-gray-300 hover:bg-gray-50 transition-colors"
            >
              Kembali ke Login
            </a>
          </div>
        </div>
      </div>
    </nav>

    <div
      class="flex-grow flex items-center justify-center px-4 sm:px-6 lg:px-8 pt-24 pb-12"
    >
      <div
        class="max-w-md w-full bg-white rounded-3xl shadow-xl border border-gray-100 p-8 sm:p-10 relative animate-card"
      >
        <div class="flex justify-center mb-6">
          <div
            class="w-14 h-14 bg-red-50 border border-red-100 text-red-500 rounded-2xl flex items-center justify-center text-2xl"
          >
            <i class="fa-solid fa-unlock-keyhole"></i>
          </div>
        </div>

        <div class="text-center mb-8">
          <h3 class="text-2xl font-bold text-gray-900 mb-2">Reset Password</h3>
          <p class="text-gray-500 text-sm px-2">
            Masukkan email terdaftar dan buat kredensial password baru Anda.
          </p>
        </div>

        <div
          id="alertBox"
          class="hidden px-4 py-3 rounded-xl mb-6 flex flex-col items-start text-sm font-medium transition-all"
        >
          <div class="flex items-start">
            <i id="alertIcon" class="fa-solid mt-0.5 mr-3"></i>
            <span id="alertMessage"></span>
          </div>
          <div
            id="rawPasswordBox"
            class="hidden w-full mt-3 pt-3 border-t border-blue-200"
          >
            <span class="text-xs text-blue-600 block mb-1"
              >Terjemahan (Teks Asli):</span
            >
            <code
              id="rawPasswordText"
              class="bg-white px-2 py-1 rounded text-gray-800 border border-blue-100 block text-center font-bold tracking-wider"
            ></code>
          </div>
        </div>

        <form id="resetForm" class="space-y-5">
          <div>
            <label class="block text-sm font-semibold text-gray-700 mb-1.5"
              >Email Admin</label
            >
            <div class="relative">
              <div
                class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none"
              >
                <i class="fa-regular fa-envelope text-gray-400"></i>
              </div>
              <input
                type="email"
                id="email"
                required
                autofocus
                class="block w-full pl-10 pr-4 py-3 bg-gray-50 border border-gray-200 rounded-xl text-gray-900 text-sm focus:ring-2 focus:ring-primary/20 focus:border-primary focus:bg-white outline-none transition-all placeholder-gray-400"
                placeholder="admin@domain.com"
              />
            </div>
          </div>

          <div>
            <label class="block text-sm font-semibold text-gray-700 mb-1.5"
              >Password Baru</label
            >
            <div class="relative">
              <div
                class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none"
              >
                <i class="fa-solid fa-key text-gray-400 text-sm"></i>
              </div>
              <input
                type="password"
                id="password_baru"
                required
                minlength="6"
                class="block w-full pl-10 pr-10 py-3 bg-gray-50 border border-gray-200 rounded-xl text-gray-900 text-sm focus:ring-2 focus:ring-primary/20 focus:border-primary focus:bg-white outline-none transition-all placeholder-gray-400"
                placeholder="Minimal 6 karakter"
              />
              <button
                type="button"
                onclick="toggleVisibility('password_baru', this)"
                class="absolute inset-y-0 right-0 pr-4 flex items-center text-gray-400 hover:text-gray-600 focus:outline-none"
              >
                <i class="fa-regular fa-eye"></i>
              </button>
            </div>
          </div>

          <div>
            <label class="block text-sm font-semibold text-gray-700 mb-1.5"
              >Konfirmasi Password Baru</label
            >
            <div class="relative">
              <div
                class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none"
              >
                <i class="fa-solid fa-check-double text-gray-400 text-sm"></i>
              </div>
              <input
                type="password"
                id="konfirmasi_password"
                required
                class="block w-full pl-10 pr-10 py-3 bg-gray-50 border border-gray-200 rounded-xl text-gray-900 text-sm focus:ring-2 focus:ring-primary/20 focus:border-primary focus:bg-white outline-none transition-all placeholder-gray-400"
                placeholder="Ulangi password baru"
              />
              <button
                type="button"
                onclick="toggleVisibility('konfirmasi_password', this)"
                class="absolute inset-y-0 right-0 pr-4 flex items-center text-gray-400 hover:text-gray-600 focus:outline-none"
              >
                <i class="fa-regular fa-eye"></i>
              </button>
            </div>
          </div>

          <div class="pt-2">
            <button
              type="submit"
              id="submitBtn"
              class="w-full flex justify-center py-3 px-4 border border-transparent rounded-xl shadow-lg shadow-primary/30 text-sm font-bold text-white bg-primary hover:bg-primaryHover focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary transition-all hover:-translate-y-0.5"
            >
              Ganti Password Sekarang
            </button>
          </div>

          <p class="text-xs color-gray-500 text-center text-gray-400 mt-4">
            <i class="fa-solid fa-shield-halved mr-1"></i> Password akan di-hash
            otomatis (Bcrypt) sebelum disimpan ke database.
          </p>
        </form>
      </div>
    </div>

    <script>
      // === 1. FITUR TOGGLE PASSWORD ===
      function toggleVisibility(inputId, btn) {
        const input = document.getElementById(inputId);
        const icon = btn.querySelector("i");

        if (input.type === "password") {
          input.type = "text";
          icon.classList.remove("fa-eye");
          icon.classList.add("fa-eye-slash");
        } else {
          input.type = "password";
          icon.classList.remove("fa-eye-slash");
          icon.classList.add("fa-eye");
        }
      }

      // === 2. FUNGSI MENAMPILKAN ALERT ===
      function showAlert(type, message, rawPassword = null) {
        const box = document.getElementById("alertBox");
        const icon = document.getElementById("alertIcon");
        const msg = document.getElementById("alertMessage");
        const rawBox = document.getElementById("rawPasswordBox");
        const rawText = document.getElementById("rawPasswordText");

        box.classList.remove(
          "hidden",
          "bg-red-50",
          "border-red-200",
          "text-red-600",
          "bg-blue-50",
          "border-blue-200",
          "text-blue-700",
        );
        icon.classList.remove("fa-circle-exclamation", "fa-circle-check");
        rawBox.classList.add("hidden");

        if (type === "error") {
          box.classList.add(
            "bg-red-50",
            "border",
            "border-red-200",
            "text-red-600",
          );
          icon.classList.add("fa-circle-exclamation");
        } else if (type === "success") {
          box.classList.add(
            "bg-blue-50",
            "border",
            "border-blue-200",
            "text-blue-700",
          );
          icon.classList.add("fa-circle-check");

          // Tampilkan teks asli jika disertakan
          if (rawPassword) {
            rawText.textContent = rawPassword;
            rawBox.classList.remove("hidden");
          }
        }

        msg.textContent = message;
      }

      // === 3. LOGIKA FETCH RESET KE GOOGLE APPS SCRIPT ===
      const GAS_API_URL = "https://script.google.com/macros/s/AKfycbzflPmqZeF-s2F60zuUcP5GiSrQbGFvWqV4HzT9nnCh53m1wymGkDqC2alQp0icpJWgCg/exec
";

      document
        .getElementById("resetForm")
        .addEventListener("submit", async function (e) {
          e.preventDefault();

          const email = document.getElementById("email").value;
          const pass1 = document.getElementById("password_baru").value;
          const pass2 = document.getElementById("konfirmasi_password").value;
          const submitBtn = document.getElementById("submitBtn");

          // Validasi kecocokan password di browser
          if (pass1 !== pass2) {
            showAlert("error", "Maaf, Konfirmasi password tidak cocok!");
            return;
          }

          // Loading state tombol
          const originalBtnText = submitBtn.innerHTML;
          submitBtn.innerHTML =
            '<i class="fa-solid fa-spinner fa-spin mr-2"></i> Memproses...';
          submitBtn.disabled = true;

          try {
            if (GAS_API_URL === "URL_GAS_WEB_APP_ANDA_DISINI") {
              throw new Error("Sistem belum terhubung ke database API (GAS).");
            }

            // Kirim request ke Backend GAS
            const payload = {
              action: "reset_password",
              email: email,
              password_baru: pass1,
            };

            const response = await fetch(GAS_API_URL, {
              method: "POST",
              body: JSON.stringify(payload),
            });

            const result = await response.json();

            if (result.status === "success") {
              // Sesuai script PHP sebelumnya: tampilkan pesan sukses & password terjemahan
              showAlert("success", "Password berhasil diperbarui!", pass1);
              document.getElementById("resetForm").reset(); // Kosongkan form
            } else {
              throw new Error(
                result.message || "Email tidak ditemukan dalam database!",
              );
            }
          } catch (error) {
            showAlert("error", error.message);
          } finally {
            // Kembalikan tombol ke semula
            submitBtn.innerHTML = originalBtnText;
            submitBtn.disabled = false;
          }
        });
    </script>
  </body>
</html>
